interface:
  display_name: "Analyze Creator Content"
  short_description: "Find creator patterns and breakout videos"
  default_prompt: "Use $analyze-creator-content on this creator: [profile URL]. Review every accessible video and extract content types, hooks, exact topic frequency, main themes, audience jobs, recurring series, CTAs, proof devices, reused script structures, research claims, visible performance metrics, viral or breakout video candidates, and a source-linked content library. Rank top videos using timestamped visible metrics and a creator-relative baseline; do not infer virality when metrics are unavailable or incomparable. If sign-in is required, pause for me to sign in manually in the browser session you can use, then resume after I confirm; never ask for credentials, cookies, browser storage, or session files."
