interface:
  display_name: "Analyze Creator Content"
  short_description: "Find creator patterns and breakout videos"
  default_prompt: "Use $analyze-creator-content on these 3-6 permitted post URLs: [links]. Do not expand beyond the user-supplied set. Build a source-linked content library and extract topics, main themes, hooks, formats, CTAs, proof devices, recurring structures, research claims, and timestamped visible performance. Preserve every access gap and do not infer inaccessible content. Confirm that the acquisition method is permitted by current platform rules; manual sign-in provides access, not permission to automate collection. Never ask for credentials, cookies, browser storage, or session files."
